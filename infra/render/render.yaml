# ─────────────────────────────────────────────
# Render.com Blueprint para Evidence AI
# ─────────────────────────────────────────────
# Uso: En Render → Blueprints → New Blueprint Instance → conectar el repo.
# Render lee este archivo y crea los servicios automáticamente.
#
# Servicios externos (los creas tú aparte, free tier):
#   • Supabase (Postgres con pgvector)  → https://supabase.com
#   • Upstash (Redis)                   → https://upstash.com
# Luego pegas sus connection strings en las env vars marcadas `sync: false`.
#
# NOTA sobre Render Free Tier:
# - No soporta `preDeployCommand` → migraciones corren en dockerCommand.
# - No soporta `type: worker` (Background Workers) → el pipeline corre
#   in-process dentro del API usando InProcessJobQueue.
# ─────────────────────────────────────────────

services:
  # ─── API (FastAPI) — incluye el pipeline in-process ───
  - type: web
    name: evidence-ai-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true

    # CMD del Dockerfile ya corre `alembic upgrade head && uvicorn ...`.
    # No definimos dockerCommand aquí para evitar problemas de YAML/shell parsing
    # en Render. Alembic es idempotente — si las migraciones ya están aplicadas,
    # no hace nada.

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

      # Connection strings — pegar manualmente desde Supabase / Upstash
      - key: DATABASE_URL
        sync: false  # postgresql+asyncpg://postgres:PASS@db.SUPABASE_REF.supabase.co:5432/postgres
      - key: REDIS_URL
        sync: false  # rediss://default:PASS@xxxxx.upstash.io:6379

      # Claude API
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_REASONING_MODEL
        value: claude-sonnet-4-6
      - key: CLAUDE_FAST_MODEL
        value: claude-haiku-4-5-20251001
      - key: CLAUDE_MAX_TOKENS
        value: "4096"

      # Búsqueda
      - key: SEARCH_PROVIDERS
        value: duckduckgo
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_CSE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false

      # Auth
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TTL_MINUTES
        value: "15"
      - key: JWT_REFRESH_TTL_DAYS
        value: "30"

      # CORS — el dominio Vercel se setea después del primer deploy del frontend
      - key: CORS_ORIGINS
        sync: false  # ej: https://evidence-ai.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: 'https://.*\.vercel\.app'

      # Rate limits
      - key: RATE_LIMIT_DEFAULT
        value: 60/minute
      - key: RATE_LIMIT_VERIFICATION
        value: 10/hour

      # Pipeline
      - key: MAX_CLAIMS_PER_VERIFICATION
        value: "15"
      - key: MAX_SOURCES_PER_CLAIM
        value: "10"
      - key: MAX_INPUT_CHARS
        value: "50000"
      - key: VERIFICATION_TIMEOUT_SECONDS
        value: "180"
