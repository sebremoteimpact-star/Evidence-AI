# ─────────────────────────────────────────────
# Ruff — linter y formateador para Python
# ─────────────────────────────────────────────
line-length = 100
target-version = "py312"

[lint]
select = [
  "E", "W",      # pycodestyle
  "F",           # pyflakes
  "I",           # isort
  "B",           # bugbear
  "C4",          # comprehensions
  "UP",          # pyupgrade
  "SIM",         # simplify
  "ARG",         # unused arguments
  "PTH",         # use pathlib
  "RUF",         # ruff-specific
  "S",           # bandit (security)
  "T20",         # no print
  "TID",         # tidy imports
  "RET",         # return
  "ASYNC",       # async
]
ignore = [
  "E501",        # line length manejado por formatter
  "S101",        # assert OK en tests
]

[lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "ARG001", "ARG002"]
"src/evidence_ai/infrastructure/migrations/**" = ["S101"]

[lint.isort]
known-first-party = ["evidence_ai"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
